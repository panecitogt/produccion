<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panecito Gerencia</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #fff8f0; min-height: 100vh; }
.header { background: #6c3483; color: white; padding: 16px; text-align: center; }
.header h1 { font-size: 22px; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.container { max-width: 560px; margin: 0 auto; padding: 16px; }
#loginScreen { padding: 40px 16px; text-align: center; }
#loginScreen h2 { color: #6c3483; margin-bottom: 24px; font-size: 20px; }
.pin-display { font-size: 36px; letter-spacing: 12px; color: #333; background: #fff; border: 2px solid #ddd; border-radius: 8px; padding: 8px 16px; margin-bottom: 16px; display: inline-block; min-width: 160px; }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 240px; margin: 0 auto 16px; }
.numpad button { padding: 18px; font-size: 20px; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; color: #333; }
.btn-borrar { background: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
.btn-entrar { width: 100%; max-width: 240px; padding: 14px; background: #6c3483; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
.error-msg { color: #e74c3c; font-size: 14px; margin-top: 8px; min-height: 20px; }
#appScreen { display: none; }
.top-bar { background: #6c3483; color: white; padding: 12px 16px; font-size: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
.btn-salir-top { background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
.card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.card h3 { color: #6c3483; font-size: 16px; margin-bottom: 14px; border-bottom: 2px solid #6c3483; padding-bottom: 8px; }
label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: bold; }
select, input[type=text], input[type=number] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; margin-bottom: 12px; background: #fafafa; }
.btn-asignar { width: 100%; padding: 13px; background: #6c3483; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
.msg-ok { text-align: center; color: #27ae60; font-weight: bold; font-size: 14px; margin-top: 8px; min-height: 20px; }
.tabla-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #6c3483; color: white; padding: 10px 8px; text-align: left; }
td { padding: 9px 8px; border-bottom: 1px solid #eee; }
tr:nth-child(even) { background: #faf5ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
.badge-pendiente { background: #ffeeba; color: #856404; }
.badge-completado { background: #d4edda; color: #155724; }
.btn-recargar { width: 100%; padding: 11px; background: #2980b9; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }
.spinner { text-align: center; padding: 20px; color: #999; font-size: 14px; }
.sin-datos { text-align: center; color: #999; padding: 20px; }
</style>
</head>
<body>
<div class="header"><h1>Panecito - Gerencia</h1><p>Panel de control</p></div>
<div id="loginScreen" class="container">
<h2>PIN de Gerencia</h2>
<div class="pin-display" id="pinDisplay">_ _ _ _</div><br><br>
<div class="numpad">
<button onclick="presionarNumero('1')">1</button><button onclick="presionarNumero('2')">2</button><button onclick="presionarNumero('3')">3</button>
<button onclick="presionarNumero('4')">4</button><button onclick="presionarNumero('5')">5</button><button onclick="presionarNumero('6')">6</button>
<button onclick="presionarNumero('7')">7</button><button onclick="presionarNumero('8')">8</button><button onclick="presionarNumero('9')">9</button>
<button onclick="borrarUltimo()" class="btn-borrar">DEL</button><button onclick="presionarNumero('0')">0</button><button onclick="borrarTodo()" class="btn-borrar">CLR</button>
</div>
<button class="btn-entrar" onclick="verificarPin()">Entrar</button>
<div class="error-msg" id="errorMsg"></div>
</div>
<div id="appScreen">
<div class="top-bar"><span>Gerencia</span><button class="btn-salir-top" onclick="cerrarSesion()">Salir</button></div>
<div class="container">
<div class="card">
<h3>Asignar tarea</h3>
<label>Colaboradora</label>
<select id="selColab"><option value="Brenda">Brenda</option><option value="Mayra">Mayra</option><option value="Titis">Titis</option><option value="Yanet">Yanet</option></select>
<label>Receta / Producto</label>
<input type="text" id="inputReceta" placeholder="Ej: Pan de yuca, Brownie...">
<label>Unidades</label>
<input type="number" id="inputUnidades" placeholder="0" min="1">
<button class="btn-asignar" onclick="asignarTarea()">Asignar</button>
<div class="msg-ok" id="msgOk"></div>
</div>
<div class="card">
<h3>Tareas del dia</h3>
<label>Filtrar por colaboradora</label>
<select id="filtroColab" onchange="cargarPendientes()">
<option value="">Todas</option><option value="Brenda">Brenda</option><option value="Mayra">Mayra</option><option value="Titis">Titis</option><option value="Yanet">Yanet</option>
</select>
<div id="tablaPendientes" class="tabla-wrap"><div class="spinner">Cargando...</div></div>
<button class="btn-recargar" onclick="cargarPendientes()">Actualizar</button>
</div>
</div>
</div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxQrxA2xJrw4nhamQcE0fkKu5GXVNxV67rLTwvgqEPpbTh0uKuE1W3QZDylXrsT3JQ/exec";
const PIN_GERENCIA="3003";
let pinActual="";
function hoyFecha(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function presionarNumero(n){if(pinActual.length>=4)return;pinActual+=n;actualizarDisplay();}
function borrarUltimo(){pinActual=pinActual.slice(0,-1);actualizarDisplay();}
function borrarTodo(){pinActual="";actualizarDisplay();}
function actualizarDisplay(){let txt="";for(let i=0;i<4;i++)txt+=(pinActual[i]?"*":"_")+" ";document.getElementById("pinDisplay").textContent=txt.trim();document.getElementById("errorMsg").textContent="";}
function verificarPin(){if(pinActual===PIN_GERENCIA){document.getElementById("loginScreen").style.display="none";document.getElementById("appScreen").style.display="block";cargarPendientes();}else{document.getElementById("errorMsg").textContent="PIN incorrecto.";pinActual="";actualizarDisplay();}}
function asignarTarea(){const colab=document.getElementById("selColab").value;const receta=document.getElementById("inputReceta").value.trim();const unidades=document.getElementById("inputUnidades").value;if(!receta||!unidades){alert("Completa receta y unidades");return;}const url=SCRIPT_URL+"?tipo=asignacion&colaboradora="+encodeURIComponent(colab)+"&receta="+encodeURIComponent(receta)+"&unidades="+unidades+"&fecha="+hoyFecha()+"&callback=respuestaAsignar";const s=document.createElement("script");s.src=url;document.body.appendChild(s);document.getElementById("msgOk").textContent="Guardando...";}
function respuestaAsignar(data){document.getElementById("msgOk").textContent="Tarea asignada";document.getElementById("inputReceta").value="";document.getElementById("inputUnidades").value="";setTimeout(function(){document.getElementById("msgOk").textContent="";},3000);cargarPendientes();}
function cargarPendientes(){const filtro=document.getElementById("filtroColab").value;document.getElementById("tablaPendientes").innerHTML='<div class="spinner">Cargando...</div>';const url=SCRIPT_URL+"?tipo=pendientes&colab="+encodeURIComponent(filtro)+"&fecha="+hoyFecha()+"&callback=respuestaPendientes";const s=document.createElement("script");s.src=url;document.body.appendChild(s);}
function respuestaPendientes(data){const cont=document.getElementById("tablaPendientes");if(!data||!data.data||data.data.length===0){cont.innerHTML='<div class="sin-datos">No hay tareas</div>';return;}let html='<table><thead><tr><th>Receta</th><th>Unidades</th><th>Estado</th></tr></thead><tbody>';data.data.forEach(function(t){const badge=t.estado==="Completado"?'<span class="badge badge-completado">Hecho</span>':'<span class="badge badge-pendiente">Pendiente</span>';html+='<tr><td>'+t.receta+'</td><td>'+t.unidades+'</td><td>'+badge+'</td></tr>';});html+='</tbody></table>';cont.innerHTML=html;}
function cerrarSesion(){pinActual="";actualizarDisplay();document.getElementById("appScreen").style.display="none";document.getElementById("loginScreen").style.display="block";}
</script>
</body>
</html>
